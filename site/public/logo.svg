<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="AI Productivity Hub">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Hexagon background -->
  <polygon
    points="32,4 56,17 56,47 32,60 8,47 8,17"
    fill="url(#grad)"
  />

  <!-- Lightning bolt — top-right cluster to bottom-left, crisp polygon -->
  <polygon
    points="36,12 24,34 31,34 28,52 40,30 33,30"
    fill="url(#bolt-grad)"
  />
</svg>
